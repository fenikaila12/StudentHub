<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
</head>
<body bgcolour="white">
    <form>
        <table align="center" width="800" cellpadding="10">
            <tr>
                <td colspan="2" align="center">
                    <h1>Create Your Account</h1>
                </td>
            </tr>

            <tr>
                <td>
                    <input type="text" size="50" placeholder="Full Name">
                    <input type="text" size="50" placeholder="Email Address">
                </td>
            </tr>

            <tr>
                <td>
                    <input type="text" size="50" placeholder="Mobile No.">
                    <input type="text" size="50" placeholder="Gender">
                </td>
            </tr>

            <tr>
                <td>
                    <input type="text" size="50" placeholder="Password">
                    <input type="text" size="50" placeholder="confirm Password">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Register" />
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
